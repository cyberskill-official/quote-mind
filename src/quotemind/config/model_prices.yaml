# TASK-112 cost accounting: list prices, USD per 1,000,000 tokens.
#
# Source: Alibaba Cloud Model Studio model pricing, International (Singapore) endpoint.
#   https://www.alibabacloud.com/help/en/model-studio/model-pricing
#   https://www.alibabacloud.com/help/en/model-studio/embedding
#
# These are published *list* prices, not what any given account is billed (batch inference, context
# caching and the free quota all discount them). Costs reported by QuoteMind are therefore an upper
# bound, which is the honest thing to show in an eval. Re-check `as_of` before trusting the numbers.
#
# Tiering note: qwen3-max and qwen-plus are tiered by prompt length. QuoteMind's prompts are a few
# thousand tokens, so the cheapest tier applies and is the one recorded here. If a prompt ever grows
# past 32K (qwen3-max) or 256K (qwen-plus), the real cost is higher than this table reports.

as_of: 2026-07-11
currency: USD
unit: per_1m_tokens
endpoint: international-singapore

models:
  qwen3-max: # tier 0 < tokens <= 32K
    input: 1.20
    output: 6.00
  qwen-plus: # tier 0 < tokens <= 256K, non-thinking mode
    input: 0.40
    output: 1.20
  qwen-vl-ocr:
    input: 0.07
    output: 0.16
  text-embedding-v4: # billed on tokens processed; no separate output price
    input: 0.07
    output: 0.00
