name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # PR-1 imports only the light core; move to .[all,dev] when a heavy import lands
      # (PR-4 memory / EP-02 agents) so import-linter can build the full graph.
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: lint-imports

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: mypy -p quotemind

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: pytest -q --cov=quotemind --cov-branch --cov-report=term-missing
      # Money path: 100% branch coverage on the pricing engine (NFR-010, QM-REPO-001 section 8).
      - run: pytest -q --cov=quotemind.pricing --cov-branch --cov-fail-under=100

  # TODO(later PRs): smoke-eval (FR-123), golden-pdf (FR-124), diagrams (SUB-03).
