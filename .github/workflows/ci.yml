name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Offline gate installs the packages whose modules are imported so import-linter can
      # build the full graph: memory (Tablestore) + parse (openpyxl). Agents/PDF land later.
      - run: pip install -e .[memory,parse,dev]
      - run: ruff check .
      - run: lint-imports

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[memory,parse,dev]
      - run: mypy -p quotemind

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[memory,parse,dev]
      - run: pytest -q --cov=quotemind --cov-branch --cov-report=term-missing
      # Money path: 100% branch coverage on the pricing engine (NFR-010, QM-REPO-001 section 8).
      - run: pytest -q --cov=quotemind.pricing --cov-branch --cov-fail-under=100

  # TODO(later PRs): smoke-eval (FR-123), golden-pdf (FR-124), diagrams (SUB-03).
